<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#173d66" />
    <title>Meisterplaner offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Aptos", "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        background: #f7f6f2;
        color: #173d66;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top right, rgba(104, 213, 200, 0.22), transparent 32%),
          linear-gradient(rgba(23, 61, 102, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(23, 61, 102, 0.08) 1px, transparent 1px),
          #f7f6f2;
        background-size: auto, 40px 40px, 40px 40px, auto;
      }

      main {
        width: min(100%, 420px);
        border-radius: 28px;
        padding: 28px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(23, 61, 102, 0.12);
        box-shadow: 0 24px 64px rgba(15, 23, 42, 0.12);
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #173d66;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 14px 0 0;
        color: rgba(23, 61, 102, 0.76);
        line-height: 1.6;
      }

      button {
        margin-top: 22px;
        width: 100%;
        border: 0;
        border-radius: 18px;
        padding: 14px 18px;
        background: #173d66;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Meisterplaner Mitarbeiter-App</p>
      <h1>Im Moment offline</h1>
      <p>
        Die App ist installiert, aber es besteht gerade keine Verbindung zum Server.
        Sobald du wieder online bist, kannst du deine Einsaetze normal weiter nutzen.
      </p>
      <button type="button" onclick="window.location.reload()">Erneut versuchen</button>
    </main>
  </body>
</html>
