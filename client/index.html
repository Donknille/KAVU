<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Digitale Einsatzplanung und mobile Zeiterfassung fuer Handwerksbetriebe." />
    <meta name="theme-color" content="#173d66" />
    <meta name="application-name" content="Meisterplaner" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Meisterplaner" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Meisterplaner | Einsatzplanung &amp; Zeiterfassung</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <style>
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom, 0); }
    </style>
    <script>
      (function () {
        const reloadKey = "meisterplaner-asset-recovery";

        async function clearRuntimeCaches() {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const cacheKeys = await caches.keys();
            await Promise.all(cacheKeys.map((cacheKey) => caches.delete(cacheKey)));
          }
        }

        function markHealthyLoad() {
          sessionStorage.removeItem(reloadKey);
        }

        async function recoverFromMissingAsset() {
          if (sessionStorage.getItem(reloadKey) === "1") {
            return;
          }

          sessionStorage.setItem(reloadKey, "1");
          await clearRuntimeCaches();

          const targetUrl = new URL(window.location.href);
          targetUrl.searchParams.set("_asset_refresh", Date.now().toString());
          window.location.replace(targetUrl.toString());
        }

        window.addEventListener("load", markHealthyLoad, { once: true });

        window.addEventListener(
          "error",
          (event) => {
            const target = event.target;
            if (!(target instanceof HTMLScriptElement || target instanceof HTMLLinkElement)) {
              return;
            }

            const source = target.src || target.href || "";
            if (!source.includes("/assets/")) {
              return;
            }

            void recoverFromMissingAsset();
          },
          true,
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
