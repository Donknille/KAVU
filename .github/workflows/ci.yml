name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run test:planning-dnd
      - run: npm run test:tenant-security

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Start server and run E2E
        run: |
          LOCAL_PREVIEW=1 NODE_ENV=production node dist/index.cjs &
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:5000/healthz && break
            sleep 1
          done
          npm run test:preview-e2e
        env:
          PORT: 5000
